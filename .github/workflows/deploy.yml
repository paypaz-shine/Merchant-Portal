name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个部署，新的触发会取消排队中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  report-build-status:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build succeeded"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 5
